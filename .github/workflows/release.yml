name: release
on:
  push:
    tags: ['v*-*']          # v<etver>-<pkgrev>, e.g. v1.3.1-1

permissions:
  contents: read

env:
  # Single source of truth for linux release platforms. manylinux bakes the architecture into the
  # container image name, so each entry carries its own container + runner. Adding a platform
  # (e.g. linux-aarch64) later is a one-line append here; no job-level YAML changes needed.
  PLATFORMS: >-
    [
        {"platform":"linux-x86_64","container":"quay.io/pypa/manylinux_2_28_x86_64","runs_on":"ubuntu-latest"},
        {"platform":"linux-aarch64","container":"quay.io/pypa/manylinux_2_28_aarch64","runs_on":"ubuntu-24.04-arm"}
    ]

jobs:
  setup:
    # env is not readable from strategy.matrix so build's matrix reads this job's output
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      platforms: ${{ steps.platforms.outputs.platforms }}
    steps:
        # `tee -a` used in place of `>>` to simplify debugging
      - id: platforms
        run: |
          {
            echo "platforms<<EOF"
            echo "$PLATFORMS"
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: ${{ matrix.combo.runs_on }}
    container:
      image: ${{ matrix.combo.container }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        variant: [bare, logging, devtools]
        combo: ${{ fromJSON(needs.setup.outputs.platforms) }}
    steps:
      - uses: actions/checkout@v7
      - name: Derive versions from tag
        id: ver
        run: ./scripts/derive-version.sh >> "$GITHUB_OUTPUT"
      - name: Checkout ExecuTorch source
        uses: ./.github/actions/checkout-executorch
        with:
          ref: ${{ steps.ver.outputs.ettag }}
      - name: Build runtime
        run: |
          export PATH=/opt/python/cp312-cp312/bin:$PATH
          ./build-runtime.sh --variant "${{ matrix.variant }}" \
            --prefix "$PWD/out" --et-src "$PWD/et-src/executorch" \
            --et-tag "${{ steps.ver.outputs.ettag }}"
      - name: LSTM round-trip gate (export -> run vs eager)
        # Variant-identical kernel: gate on `logging` only (both platforms). The round-trip
        # recipe now lives in the composite action, shared with the extras-gate workflow.
        if: matrix.variant == 'logging'
        uses: ./.github/actions/lstm-roundtrip
        with:
          # workspace-relative (built at $PWD/out above); the action re-roots onto $PWD, the
          # real container workspace — the github.workspace expression is the host path here.
          prefix: out
      - name: Emit + package LSTM fixtures (arch-independent; x86_64 logging only)
        if: matrix.variant == 'logging' && matrix.combo.platform == 'linux-x86_64'
        run: |
          export PATH=/opt/python/cp312-cp312/bin:$PATH
          # torch + executorch are already installed by the round-trip action above; the
          # built prefix is $PWD/out. Mint the fixtures from the SAME lstm_case source.
          python extras/lstm/aot/emit_fixtures.py "$PWD/fixtures"
          mkdir -p "$PWD/dist"
          ./scripts/package-fixtures.sh --dir "$PWD/fixtures" \
            --etver "${{ steps.ver.outputs.etver }}" --outdir "$PWD/dist"
      - name: Package
        run: |
          ./scripts/package.sh --prefix "$PWD/out" --etver "${{ steps.ver.outputs.etver }}" \
            --variant "${{ matrix.variant }}" --platform "${{ matrix.combo.platform }}" \
            --package-tag "${GITHUB_REF_NAME}" --outdir "$PWD/dist"
      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: dist/*.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.variant }}-${{ matrix.combo.platform }}
          path: dist/*

  #
  # Windows amd64 support is implemented via `build-windows` below (MSVC, logging variant
  # only, GitHub-hosted windows-2022 runner, no container). macOS remains future work and
  # would follow the same pattern: a new `build-macos` job, uploading via the same
  # `dist-variant-platform` naming, added to `pin`'s `needs`.

  build-windows:
    needs: setup
    runs-on: windows-2022
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        variant: [logging]
    steps:
      - uses: actions/checkout@v7
      - name: Derive versions from tag
        id: ver
        shell: bash
        run: ./scripts/derive-version.sh >> "$GITHUB_OUTPUT"
      - name: Checkout ExecuTorch source
        uses: ./.github/actions/checkout-executorch
        with:
          ref: ${{ steps.ver.outputs.ettag }}
      - name: Build runtime (MSVC)
        shell: pwsh
        run: |
          & "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\Launch-VsDevShell.ps1" -Arch amd64 -SkipAutomaticLocation
          bash ./build-runtime.sh --variant ${{ matrix.variant }} `
            --prefix "$PWD/out" --et-src "$PWD/et-src/executorch" `
            --et-tag ${{ steps.ver.outputs.ettag }} --platform windows-x86_64
      - name: Package
        shell: bash
        run: |
          ./scripts/package.sh --prefix "$PWD/out" --etver "${{ steps.ver.outputs.etver }}" \
            --variant "${{ matrix.variant }}" --platform windows-x86_64 \
            --package-tag "${GITHUB_REF_NAME}" --outdir "$PWD/dist" \
            --toolchain "msvc-2022"
      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: dist/*.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.variant }}-windows-x86_64
          path: dist/*

  pin:
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate EtRuntimePin.cmake
        run: |
          eval "$(./scripts/derive-version.sh)"
          base="${{ github.server_url }}/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}"
          args=(--version "$pkgver" --etver "$etver" --base-url "$base")
          while IFS=$'\t' read -r variant platform sha; do
            args+=(--row "$variant" "$platform" "$sha")
          done < <(./scripts/discover-pin-rows.sh --dir dist --etver "$etver")
          ./scripts/gen-pin.sh "${args[@]}" > dist/EtRuntimePin.cmake
          {
            echo '```cmake'
            cat dist/EtRuntimePin.cmake
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: pin
          path: dist/EtRuntimePin.cmake

  release:
    needs: pin
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create/Update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --notes "ExecuTorch runtime ${GITHUB_REF_NAME} (torch 2.12.0+cpu). Per-artifact toolchain in each BUILDINFO." \
          || gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
